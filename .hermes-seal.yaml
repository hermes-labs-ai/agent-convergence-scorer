# hermes-seal v1 manifest — agent-convergence-scorer
#
# Staged for grant. The `signing` block holds placeholder values that fail
# verification by design. Operator runs `sudo hermes-seal grant <repo-path>`
# to replace `pubkey`, `signature`, and `file_hashes` with real values.
# Agents cannot run grant — signing keys are root-owned (MAXIM 15 sovereignty).
#
# Pre-grant: `hermes-seal verify` exits 1 (expected).
# Post-grant: `hermes-seal verify` exits 0.
seal_version: 1
repo: hermes-labs-ai/agent-convergence-scorer
granted: '2026-04-22T00:00:00Z'
expires: '2027-04-22T00:00:00Z'
categories:
  continuity:
    health_endpoint: null
    graceful_degradation:
      - dependency: stdin_or_file_input
        on_failure: exit_1_with_human_error_on_stderr
        verified_by: tests/test_graceful_degrade.py::test_degrade_missing_file
        env:
          PYTHONPATH: src
      - dependency: json_parser
        on_failure: exit_1_with_invalid_json_message
        verified_by: tests/test_graceful_degrade.py::test_degrade_malformed_json
        env:
          PYTHONPATH: src
      - dependency: input_shape
        on_failure: exit_1_with_shape_error
        verified_by: tests/test_graceful_degrade.py::test_degrade_empty_list
        env:
          PYTHONPATH: src
      - dependency: element_types
        on_failure: exit_1_with_type_error
        verified_by: tests/test_graceful_degrade.py::test_degrade_wrong_element_type
        env:
          PYTHONPATH: src
  reliability:
    test_command: python3 -m pytest -q
    coverage_min: 0.0
    no_silent_failures: true
    scan_paths:
      - src/agent_convergence_scorer
    silent_failure_check: null
  compliance:
    license: MIT
    sbom: sbom.cdx.json
    lintlang_clean: true
    eu_ai_act: n/a
  mom_ready:
    install: pip install agent-convergence-scorer
    quickstart: README.md#quick-start
    errors_human: true
signing:
  algorithm: ed25519
  pubkey: placeholder
  signature: placeholder
  issuer: null
revocation:
  list: https://hermes-labs.ai/seal/revoked.json
